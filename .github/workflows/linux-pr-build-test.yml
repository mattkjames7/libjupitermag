name: Linux PR Build and Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: linux-pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Show tool versions
        run: |
          g++ --version
          make --version
          git --version

      - name: Build library and linked components
        run: make

      - name: Generate baseline data
        run: |
          cd test/savetestdata
          make

      - name: Run regression tests
        run: |
          cd test
          make gtest
