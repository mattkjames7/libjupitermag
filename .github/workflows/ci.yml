name: CMake Build and Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_job:
        description: Select which build job to run
        required: true
        default: all
        type: choice
        options:
          - all
          - linux-shared
          - linux-static
          - macos
          - windows-msys2
          - windows-msvc

concurrency:
  group: pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-shared:
    if: false
    # if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_job == 'all' || github.event.inputs.build_job == 'linux-shared'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Show tool versions
        run: |
          g++ --version
          cmake --version
          git --version

      - name: Configure CMake
        run: |
          cmake -S . -B build-cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DLIBJUPITERMAG_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build-cmake -j 2

      - name: Install and verify layout
        run: |
          set -euo pipefail
          prefix="$(mktemp -d)"
          cmake --install build-cmake --prefix "${prefix}"
          find "${prefix}" -type f | sort

          test -f "${prefix}/include/jupitermag.h"
          test -f "${prefix}/include/con2020.h"
          test -f "${prefix}/include/spline.h"
          test -f "${prefix}/include/internalfield.h"

          test -f "${prefix}/lib/libcon2020.a"
          test -f "${prefix}/lib/libspline.a"
          test -f "${prefix}/lib/libinternalfield.a"
          test -f "${prefix}/lib/libjupitermag.so"

      - name: Run CTest
        run: ctest --test-dir build-cmake --output-on-failure

  linux-static:
    if: false
    # if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_job == 'all' || github.event.inputs.build_job == 'linux-static'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LIBINTERNALFIELD_FETCH_REF: simplify-codegen

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Show tool versions
        run: |
          g++ --version
          cmake --version
          git --version

      - name: Configure CMake
        run: |
          cmake -S . -B build-cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DLIBJUPITERMAG_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build-cmake -j 2

      - name: Install and verify layout
        run: |
          set -euo pipefail
          prefix="$(mktemp -d)"
          cmake --install build-cmake --prefix "${prefix}"
          find "${prefix}" -type f | sort

          test -f "${prefix}/include/jupitermag.h"
          test -f "${prefix}/include/con2020.h"
          test -f "${prefix}/include/spline.h"
          test -f "${prefix}/include/internalfield.h"

          test -f "${prefix}/lib/libcon2020.a"
          test -f "${prefix}/lib/libspline.a"
          test -f "${prefix}/lib/libinternalfield.a"
          test -f "${prefix}/lib/libjupitermag.a"

      - name: Run CTest
        run: ctest --test-dir build-cmake --output-on-failure

  macos:
    if: false
    # if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_job == 'all' || github.event.inputs.build_job == 'macos'
    runs-on: macos-latest
    timeout-minutes: 15
    env:
      LIBINTERNALFIELD_FETCH_REF: simplify-codegen

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Show tool versions
        run: |
          c++ --version
          cmake --version
          git --version

      - name: Configure CMake
        run: |
          cmake -S . -B build-cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DLIBJUPITERMAG_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build-cmake -j 2

      - name: Install and verify layout
        run: |
          set -euo pipefail
          prefix="$(mktemp -d)"
          cmake --install build-cmake --prefix "${prefix}"
          find "${prefix}" -type f | sort

          test -f "${prefix}/include/jupitermag.h"
          test -f "${prefix}/include/con2020.h"
          test -f "${prefix}/include/spline.h"
          test -f "${prefix}/include/internalfield.h"

          test -f "${prefix}/lib/libcon2020.a"
          test -f "${prefix}/lib/libspline.a"
          test -f "${prefix}/lib/libinternalfield.a"
          test -f "${prefix}/lib/libjupitermag.dylib"

      - name: Run CTest
        run: ctest --test-dir build-cmake --output-on-failure

  windows-msys2:
    if: false
    # if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_job == 'all' || github.event.inputs.build_job == 'windows-msys2'
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      LIBINTERNALFIELD_FETCH_REF: simplify-codegen
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            git

      - name: Show tool versions
        run: |
          g++ --version
          cmake --version
          git --version

      - name: Configure CMake
        run: |
          cmake -S . -B build-cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DLIBJUPITERMAG_BUILD_TESTS=ON \
            -G Ninja

      - name: Build
        run: |
          export PATH="$PWD/build-cmake/src:$PWD/build-cmake/bin:$PWD/build-cmake/lib:$PATH"
          cmake --build build-cmake -j 2

      - name: Install and verify layout
        run: |
          set -euo pipefail
          prefix="$(mktemp -d)"
          cmake --install build-cmake --prefix "${prefix}"
          find "${prefix}" -type f | sort

          test -f "${prefix}/include/jupitermag.h"
          test -f "${prefix}/include/con2020.h"
          test -f "${prefix}/include/spline.h"
          test -f "${prefix}/include/internalfield.h"

          test -f "${prefix}/lib/libcon2020.a"
          test -f "${prefix}/lib/libspline.a"
          test -f "${prefix}/lib/libinternalfield.a"
          test -f "${prefix}/bin/libjupitermag.dll"
          test -f "${prefix}/lib/libjupitermag.dll.a"

      - name: Run CTest
        run: |
          export PATH="$PWD/build-cmake/src:$PWD/build-cmake/bin:$PWD/build-cmake/lib:$PATH"
          ctest --test-dir build-cmake --output-on-failure

  windows-msvc:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_job == 'all' || github.event.inputs.build_job == 'windows-msvc'
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      LIBINTERNALFIELD_FETCH_REF: simplify-codegen

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Show tool versions
        run: |
          cmake --version
          git --version

      - name: Configure CMake
        run: |
          cmake -S . -B build-cmake ^
            -G "Visual Studio 17 2022" ^
            -A x64 ^
            -DBUILD_SHARED_LIBS=ON ^
            -DLIBJUPITERMAG_BUILD_TESTS=ON
        shell: cmd

      - name: Build
        run: cmake --build build-cmake --config Release --parallel 2

      - name: Install and verify layout
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $prefix = Join-Path $env:RUNNER_TEMP ("jupitermag-install-" + [guid]::NewGuid().ToString())
          New-Item -ItemType Directory -Path $prefix | Out-Null

          cmake --install build-cmake --config Release --prefix "$prefix"
          Get-ChildItem -File -Recurse "$prefix" | Sort-Object FullName | ForEach-Object { $_.FullName }

          foreach ($required in @(
            "$prefix/include/jupitermag.h",
            "$prefix/include/con2020.h",
            "$prefix/include/spline.h",
            "$prefix/include/internalfield.h",
            "$prefix/lib/con2020.lib",
            "$prefix/lib/spline.lib",
            "$prefix/lib/internalfield.lib",
            "$prefix/bin/libjupitermag.dll",
            "$prefix/lib/libjupitermag.lib"
          )) {
            if (-not (Test-Path $required)) {
              throw "Missing expected file: $required"
            }
          }

      - name: Run CTest
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:PATH = "$PWD/build-cmake/src/Release;$PWD/build-cmake/bin/Release;$env:PATH"
          ctest --test-dir build-cmake -C Release --output-on-failure -R "^ConfigDebug\."
