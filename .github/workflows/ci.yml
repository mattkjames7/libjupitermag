name: Linux CMake Build and Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: linux-pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test-shared:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LIBINTERNALFIELD_FETCH_REF: simplify-codegen

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Show tool versions
        run: |
          g++ --version
          cmake --version
          git --version

      - name: Configure CMake
        run: |
          cmake -S . -B build-cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DLIBJUPITERMAG_LIBINTERNALFIELD_GIT_TAG=${LIBINTERNALFIELD_FETCH_REF} \
            -DLIBJUPITERMAG_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build-cmake -j 2

      - name: Run CTest
        run: ctest --test-dir build-cmake --output-on-failure

  build-and-test-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LIBINTERNALFIELD_FETCH_REF: simplify-codegen

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Show tool versions
        run: |
          g++ --version
          cmake --version
          git --version

      - name: Configure CMake
        run: |
          cmake -S . -B build-cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DLIBJUPITERMAG_LIBINTERNALFIELD_GIT_TAG=${LIBINTERNALFIELD_FETCH_REF} \
            -DLIBJUPITERMAG_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build-cmake -j 2

      - name: Run CTest
        run: ctest --test-dir build-cmake --output-on-failure
